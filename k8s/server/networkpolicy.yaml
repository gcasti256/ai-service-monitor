apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: server
  namespace: ai-monitor
  labels:
    app.kubernetes.io/name: server
    app.kubernetes.io/part-of: ai-service-monitor
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: dashboard
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 3100
          protocol: TCP
  egress:
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 443
          protocol: TCP
