apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-service-monitor.fullname" . }}-server
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ai-service-monitor.server.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "ai-service-monitor.server.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.server.port }}
      targetPort: http
      protocol: TCP
